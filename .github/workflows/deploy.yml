name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: pnpm --filter @workspace/logoviking run build
        env:
          NODE_ENV: production
          VITE_BASE_URL: /

      - name: Assemble deploy bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          rm -rf .deploy
          mkdir -p .deploy/dist .deploy/public .deploy/tmp

          cp -r artifacts/api-server/dist/. .deploy/dist/
          cp -r artifacts/logoviking/dist/. .deploy/public/
          cp ecosystem.config.cjs .deploy/

          node -e "
            const p = require('./artifacts/api-server/package.json');
            require('fs').writeFileSync('.deploy/package.json', JSON.stringify({
              name: p.name,
              version: p.version,
              type: 'module',
              engines: { node: '>=20' }
            }, null, 2));
          "

          printf 'DATABASE_URL=%s\nNODE_ENV=production\nPORT=3000\nAVATAR_STORAGE_DIR=/home/u905186102/logoviking-data/avatars\n' \
            "$DATABASE_URL" > .deploy/.env

          touch .deploy/tmp/restart.txt

      - name: Upload bundle to Hostinger via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: .deploy/
          remote_path: /home/u905186102/logoviking
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          remote_port: ${{ secrets.HOSTINGER_SSH_PORT }}

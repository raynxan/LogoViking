kind = "web"
previewPath = "/"
title = "Logoviking"
version = "1.0.0"
id = "artifacts/logoviking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21458

[services.development]
run = "pnpm --filter @workspace/logoviking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/logoviking", "run", "build" ]
publicDir = "artifacts/logoviking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21458"
BASE_PATH = "/"
